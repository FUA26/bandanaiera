version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - bandanaiera-network

  landing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.landing
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bandanaiera-network

  backoffice:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backoffice
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_ENABLED=true
      - LANDING_URL=http://landing:3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bandanaiera-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - landing
      - backoffice
    restart: unless-stopped
    networks:
      - bandanaiera-network

networks:
  bandanaiera-network:
    driver: bridge

volumes:
  redis-data:
